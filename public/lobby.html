<!DOCTYPE html>
<html>
<head>
    <title>Neon Ghost - Lobby</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050b18; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel { background: rgba(255,255,255,0.1); padding: 2rem; border-radius: 20px; text-align: center; width: 320px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="lobby" class="panel">
        <h2 id="name">Loading...</h2>
        <div style="color:#00d4ff">XP: <span id="xp">0</span></div>
        <input type="text" id="roomID" placeholder="Room Code" style="margin:10px 0; padding:10px; width:80%">
        <button onclick="joinGame()" style="padding:10px 20px; background:#00d4ff; border:none; border-radius:5px; cursor:pointer;">JOIN ARENA</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script> </body>
</html>
