<!DOCTYPE html>
<html>
<head>
    <title>Neon Ghost</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --blue: #00d4ff; --glass: rgba(255, 255, 255, 0.1); }
        body { background: #050b18; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel { background: var(--glass); backdrop-filter: blur(10px); padding: 2rem; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); width: 320px; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .hidden { display: none; }
        input { width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; background: rgba(0,0,0,0.3); color: white; }
    </style>
</head>
<body>

    <div id="authArea" class="panel">
        <h1 style="color:var(--blue); text-shadow: 0 0 10px var(--blue);">NEON GHOST</h1>
        <button class="btn" style="background:white; color:#444;" onclick="login()">
            <img src="https://www.google.com/favicon.ico" width="18"> CONTINUE WITH GOOGLE
        </button>
    </div>

    <div id="lobbyArea" class="panel hidden">
        <h2 id="welcome">Welcome</h2>
        <p>Your XP: <span id="userXP" style="color:var(--blue)">0</span></p>
        <hr style="opacity:0.2; margin: 20px 0;">
        <input type="text" id="roomIn" placeholder="Enter Room Code">
        <button class="btn" style="background:var(--blue)" onclick="enterArena()">JOIN MATCH</button>
        <button class="btn" style="background:transparent; color:red; font-size:11px; margin-top:20px;" onclick="logout()">SIGN OUT</button>
    </div>

    <script>
        // Use your URL from screenshot 1000057757.jpg
        const supabaseUrl = 'https://pcvszmvpazwkfufiaowm.supabase.co';
        const supabaseKey = 'YOUR_ANON_KEY'; // Paste your actual Anon Key here
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        const socket = io();
        let sessionUser = null;

        async function login() {
            await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
        }

        async function logout() {
            await _supabase.auth.signOut();
            location.reload();
        }

        // THIS IS THE MAGIC: It detects when you return from Google
        _supabase.auth.onAuthStateChange(async (event, session) => {
            if (session) {
                sessionUser = session.user;
                
                // Sync with your server to get/create points
                const res = await fetch('/auth/google-sync', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        email: sessionUser.email, 
                        name: sessionUser.user_metadata.full_name 
                    })
                });
                const data = await res.json();

                // SWITCH UI: Hide Login, Show Lobby
                document.getElementById('userXP').innerText = data.points;
                document.getElementById('welcome').innerText = "Hero: " + sessionUser.user_metadata.full_name;
                document.getElementById('authArea').classList.add('hidden');
                document.getElementById('lobbyArea').classList.remove('hidden');
            }
        });

        function enterArena() {
            const room = document.getElementById('roomIn').value;
            if(!room) return alert("Code Required");
            socket.emit('joinRoom', { roomID: room, email: sessionUser.email });
            // Add your board showing logic here
        }
    </script>
</body>
</html>
