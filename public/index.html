<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Ghost - Arena</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --blue: #00d4ff; --glass: rgba(255, 255, 255, 0.1); }
        body { background: #050b18; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel { background: var(--glass); backdrop-filter: blur(15px); padding: 2rem; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); width: 320px; box-shadow: 0 0 20px rgba(0,200,255,0.2); }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; margin-top: 15px; }
        input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; background: rgba(0,0,0,0.5); color: white; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="mainPanel" class="panel">
        <h1 style="color:var(--blue); text-shadow: 0 0 10px var(--blue);">NEON GHOST</h1>
        
        <div id="content">
            <p>Loading Arena...</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://pcvszmvpazwkfufiaowm.supabase.co'; 
        const SUPABASE_ANON_KEY = 'YOUR_PUBLIC_ANON_KEY'; // Use the ANON key here, NOT the service role key!

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const socket = io();

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                renderLobby(session.user);
            } else {
                renderLogin();
            }
        }

        function renderLogin() {
            document.getElementById('content').innerHTML = `
                <p style="opacity:0.7">Login to track your XP</p>
                <button class="btn" style="background:white; color:#222;" onclick="login()">
                    CONTINUE WITH GOOGLE
                </button>
            `;
        }

        async function renderLobby(user) {
            // Fetch XP from your Render server using the service role logic we built
            const res = await fetch('/auth/google-sync', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: user.email, name: user.user_metadata.full_name })
            });
            const data = await res.json();

            document.getElementById('content').innerHTML = `
                <h2 style="margin:0">${user.user_metadata.full_name}</h2>
                <div style="font-size: 24px; color: var(--blue); font-weight: bold; margin: 10px 0;">${data.points || 0} XP</div>
                <input type="text" id="roomIn" placeholder="ROOM CODE">
                <button class="btn" style="background:var(--blue); color:#000;" onclick="join()">JOIN MATCH</button>
                <button class="btn" style="background:transparent; color:red; font-size:11px;" onclick="logout()">Sign Out</button>
            `;
        }

        function login() {
            _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
        }

        async function logout() {
            await _supabase.auth.signOut();
            window.location.reload();
        }

        _supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) renderLobby(session.user);
        });

        init();
    </script>
</body>
</html>
