<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Ghost - Multiplayer</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --blue: #00d4ff; --pink: #ff007f; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Poppins', sans-serif; background: #050b18; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .panel { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; width: 320px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        input { background: rgba(0,0,0,0.4); border: 1px solid var(--glass); padding: 12px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        .primary-btn { background: var(--blue); border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; color: #050b18; transition: 0.3s; }
        .primary-btn:hover { box-shadow: 0 0 15px var(--blue); }
        .hidden { display: none; }
        .points-badge { color: var(--blue); font-weight: bold; }
        .logout-btn { background: none; border: 1px solid var(--pink); color: var(--pink); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

    <div id="authArea" class="panel">
        <h1 style="color:var(--blue); text-shadow: 0 0 10px var(--blue);">NEON LOGIN</h1>
        <input type="text" id="userIn" placeholder="Username">
        <input type="password" id="passIn" placeholder="Password">
        <button class="primary-btn" onclick="handleAuth()">LOGIN / REGISTER</button>
    </div>

    <div id="lobbyArea" class="panel hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span class="points-badge">XP: <span id="userXP">0</span></span>
            <button class="logout-btn" onclick="location.reload()">LOGOUT</button>
        </div>
        
        <h2 id="welcomeMsg" style="font-size: 14px; margin-bottom: 20px;"></h2>
        
        <input type="text" id="roomIn" placeholder="Enter Room Code">
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="primary-btn" style="background:var(--glass); color:white; border: 1px solid var(--blue);" onclick="enterGame('classic')">CLASSIC</button>
            <button class="primary-btn" style="background:var(--glass); color:white; border: 1px solid var(--pink);" onclick="enterGame('ghost')">GHOST</button>
        </div>
    </div>

    <div id="gameArea" class="panel hidden">
        <h2 id="status">Waiting for Opponent...</h2>
        <div id="board" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
            </div>
    </div>

    <script>
        const socket = io();
        let currentUser = "";
        let myPoints = 0;

        async function handleAuth() {
            const username = document.getElementById('userIn').value;
            const password = document.getElementById('passIn').value;

            const res = await fetch('/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                currentUser = username;
                myPoints = data.points;
                document.getElementById('userXP').innerText = myPoints;
                document.getElementById('welcomeMsg').innerText = "Welcome back, " + username;
                document.getElementById('authArea').classList.add('hidden');
                document.getElementById('lobbyArea').classList.remove('hidden');
            } else {
                alert(data.msg);
            }
        }

        function enterGame(mode) {
            const room = document.getElementById('roomIn').value;
            if (!room) return alert("Enter a room code!");
            
            socket.emit('joinRoom', { roomID: room, mode: mode, username: currentUser });
            document.getElementById('lobbyArea').classList.add('hidden');
            document.getElementById('gameArea').classList.remove('hidden');
        }

        socket.on('updatePoints', (newPoints) => {
            document.getElementById('userXP').innerText = newPoints;
            alert("Victory! +10 Points Saved to Cloud");
        });

        // Trigger this when you detect a win in your game logic
        function playerWon() {
            socket.emit('gameWin');
        }
    </script>
</body>
</html>
