<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Ghost</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --blue: #00d4ff; --glass: rgba(255, 255, 255, 0.1); }
        body { background: #050b18; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel { background: var(--glass); backdrop-filter: blur(15px); padding: 2rem; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); width: 320px; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginSection" class="panel">
        <h1 style="color:var(--blue)">NEON GHOST</h1>
        <button class="btn" style="background:white; color:#222;" onclick="handleLogin()">CONTINUE WITH GOOGLE</button>
    </div>

    <div id="lobbySection" class="panel hidden">
        <h2 id="displayName">Loading Hero...</h2>
        <div style="font-size: 24px; color: var(--blue);">XP: <span id="displayXP">0</span></div>
        <input type="text" id="roomInput" placeholder="ROOM CODE" style="width:80%; padding:10px; margin-top:10px;">
        <button class="btn" style="background:var(--blue)" onclick="joinMatch()">JOIN ARENA</button>
    </div>

    <script>
        // Use your project URL
        const _supabase = supabase.createClient('https://pcvszmvpazwkfufiaowm.supabase.co', 'YOUR_ANON_KEY', {
            auth: { persistSession: true, detectSessionInUrl: true }
        });

        // 1. FAST SWITCH: Show lobby as soon as session exists
        function showLobbyUI(user) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('lobbySection').classList.remove('hidden');
            document.getElementById('displayName').innerText = user.user_metadata.full_name;
        }

        // 2. CHECK ON LOAD
        window.onload = async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                showLobbyUI(session.user);
                syncPoints(session.user);
            }
        };

        // 3. LISTEN FOR REDIRECT RETURN
        _supabase.auth.onAuthStateChange((event, session) => {
            if (session && event === 'SIGNED_IN') {
                showLobbyUI(session.user);
                syncPoints(session.user);
            }
        });

        async function syncPoints(user) {
            try {
                const res = await fetch('/auth/google-sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: user.email, name: user.user_metadata.full_name })
                });
                const data = await res.json();
                document.getElementById('displayXP').innerText = data.points || 0;
            } catch (e) { console.error("Sync late, but auth is fine."); }
        }

        async function handleLogin() {
            await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: 'https://tic-tac-toe-multiplayer-k15s.onrender.com' }
            });
        }
    </script>
</body>
</html>
