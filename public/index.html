<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Tic Tac Toe</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .lobby, .game-area { width: 100%; max-width: 400px; background: var(--card); padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .board { display: grid; grid-template-columns: repeat(3, 100px); grid-gap: 10px; justify-content: center; margin: 20px 0; }
        .cell { width: 100px; height: 100px; background: #334155; border-radius: 10px; font-size: 2.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .cell:hover { background: #475569; }
        input { padding: 12px; border-radius: 8px; border: none; width: 70%; margin-bottom: 15px; background: #334155; color: white; }
        button { padding: 12px 24px; border-radius: 8px; border: none; background: var(--primary); color: var(--bg); font-weight: bold; cursor: pointer; }
        #chat { height: 120px; overflow-y: auto; background: #0f172a; padding: 10px; margin: 15px 0; border-radius: 8px; text-align: left; font-size: 0.9rem; }
        .voice-controls { margin-top: 15px; border-top: 1px solid #334155; padding-top: 15px; }
    </style>
</head>
<body>

    <h1>Tic Tac Toe 🎙️</h1>

    <div class="lobby" id="lobby">
        <input type="text" id="roomInput" placeholder="Enter Room Code...">
        <br>
        <button onclick="joinRoom()">Join Private Room</button>
    </div>

    <div class="game-area" id="gameArea" style="display:none;">
        <div id="status" style="color: var(--primary); margin-bottom: 10px;">Waiting for players...</div>
        
        <div class="board" id="board">
            <div class="cell" onclick="makeMove(0)"></div>
            <div class="cell" onclick="makeMove(1)"></div>
            <div class="cell" onclick="makeMove(2)"></div>
            <div class="cell" onclick="makeMove(3)"></div>
            <div class="cell" onclick="makeMove(4)"></div>
            <div class="cell" onclick="makeMove(5)"></div>
            <div class="cell" onclick="makeMove(6)"></div>
            <div class="cell" onclick="makeMove(7)"></div>
            <div class="cell" onclick="makeMove(8)"></div>
        </div>

        <div id="chat"></div>
        <input type="text" id="chatInput" placeholder="Press Enter to chat..." style="width: 60%;">
        <button onclick="sendChat()" style="padding: 10px;">Send</button>

        <div class="voice-controls">
            <button id="micBtn" onclick="initVoice()" style="background: #22c55e; color: white;">Enable Voice Chat</button>
            <audio id="remoteAudio" autoplay></audio>
        </div>
    </div>

    <script>
        const socket = io();
        let myTurn = false;
        let mySymbol = "";
        const cells = document.querySelectorAll('.cell');

        // GAME LOGIC
        function joinRoom() {
            const room = document.getElementById('roomInput').value;
            if (room) socket.emit('joinRoom', room);
        }

        socket.on('joined', (room) => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            mySymbol = "X"; 
            myTurn = true;
            document.getElementById('status').innerText = "You are X. Your turn!";
        });

        function makeMove(i) {
            if (cells[i].innerText === "" && myTurn) {
                cells[i].innerText = mySymbol;
                socket.emit('move', { index: i, symbol: mySymbol });
                myTurn = false;
                document.getElementById('status').innerText = "Waiting for friend...";
                checkWin();
            }
        }

        socket.on('move', (data) => {
            cells[data.index].innerText = data.symbol;
            cells[data.index].style.color = "#fb7185";
            myTurn = true;
            document.getElementById('status').innerText = "Your turn!";
            checkWin();
        });

        function checkWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            wins.forEach(c => {
                if (cells[c[0]].innerText && cells[c[0]].innerText === cells[c[1]].innerText && cells[c[0]].innerText === cells[c[2]].innerText) {
                    document.getElementById('status').innerText = `Winner: ${cells[c[0]].innerText}!`;
                    myTurn = false;
                }
            });
        }

        // CHAT LOGIC
        function sendChat() {
            const val = document.getElementById('chatInput').value;
            if(val) {
                socket.emit('chatMessage', val);
                addChat(`You: ${val}`);
                document.getElementById('chatInput').value = "";
            }
        }

        socket.on('chatMessage', msg => addChat(`Friend: ${msg}`));

        function addChat(t) {
            const c = document.getElementById('chat');
            c.innerHTML += `<div>${t}</div>`;
            c.scrollTop = c.scrollHeight;
        }

        // VOICE LOGIC (WebRTC)
        let pc;
        async function initVoice() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('micBtn').innerText = "Mic Active 🎙️";
            
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            stream.getTracks().forEach(t => pc.addTrack(t, stream));

            pc.ontrack = e => document.getElementById('remoteAudio').srcObject = e.streams[0];
            pc.onicecandidate = e => e.candidate && socket.emit('signal', { candidate: e.candidate });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('signal', { sdp: offer });
        }

        socket.on('signal', async (data) => {
            if (!pc) await initVoice();
            if (data.sdp) {
                await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                if (data.sdp.type === 'offer') {
                    const ans = await pc.createAnswer();
                    await pc.setLocalDescription(ans);
                    socket.emit('signal', { sdp: ans });
                }
            } else if (data.candidate) {
                await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });
    </script>
</body>
</html>
