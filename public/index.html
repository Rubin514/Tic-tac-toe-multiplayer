<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Private Tic Tac Toe</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; padding: 20px; }
        .lobby { margin-bottom: 20px; background: #222; padding: 20px; border-radius: 10px; }
        input { padding: 8px; border-radius: 5px; border: none; }
        .board { display: none; grid-template-columns: repeat(3, 100px); grid-gap: 5px; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; border-radius: 8px; }
        .status { margin: 15px; color: #00d4ff; font-weight: bold; }
        button { padding: 10px 20px; cursor: pointer; background: #00d4ff; border: none; border-radius: 5px; font-weight: bold; }
        #restartBtn { display: none; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>Tic Tac Toe Private</h1>

    <div class="lobby" id="lobby">
        <input type="text" id="roomInput" placeholder="Enter Room Code (e.g. 1234)">
        <button onclick="joinRoom()">Join Room</button>
    </div>

    <div class="status" id="status">Enter a room code to start playing.</div>
    
    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button id="restartBtn" onclick="sendRestart()">Restart Game</button>

    <script>
        const socket = io();
        let myTurn = false;
        let mySymbol = "";
        let currentRoom = "";

        function joinRoom() {
            const room = document.getElementById('roomInput').value;
            if (room) {
                socket.emit('joinRoom', room);
            }
        }

        socket.on('joined', (room) => {
            currentRoom = room;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('board').style.display = 'grid';
            document.getElementById('restartBtn').style.display = 'block';
            document.getElementById('status').innerText = `In Room: ${room}. Waiting for opponent...`;
            
            // First person to join gets to start
            myTurn = true;
            mySymbol = "X";
        });

        // Handle clicking cells
        const cells = document.querySelectorAll('.cell');
        cells.forEach(cell => {
            cell.addEventListener('click', () => {
                const index = cell.getAttribute('data-index');
                if (cell.innerText === "" && myTurn) {
                    cell.innerText = mySymbol;
                    cell.style.color = "#00d4ff";
                    socket.emit('move', { index, symbol: mySymbol });
                    myTurn = false;
                    document.getElementById('status').innerText = "Opponent's turn...";
                }
            });
        });

        socket.on('move', (data) => {
            const opponentSymbol = data.symbol;
            cells[data.index].innerText = opponentSymbol;
            cells[data.index].style.color = "#ff4d4d";
            myTurn = true;
            document.getElementById('status').innerText = "Your turn!";
        });

        function sendRestart() {
            resetUI();
            socket.emit('restart');
        }

        socket.on('restart', resetUI);

        function resetUI() {
            cells.forEach(c => c.innerText = "");
            myTurn = true;
            document.getElementById('status').innerText = "Game Restarted! Your turn.";
        }
    </script>
</body>
  </html>
