<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Ghost - Arena</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --blue: #00d4ff; --pink: #ff007f; --glass: rgba(255, 255, 255, 0.1); }
        body { background: #050b18; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .panel { background: var(--glass); backdrop-filter: blur(15px); padding: 2.5rem; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); width: 320px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
        .hidden { display: none !important; }
        input { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: white; text-align: center; }
        .xp-tag { font-size: 24px; color: var(--blue); font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="loginSection" class="panel">
        <h1 style="color:var(--blue); text-shadow: 0 0 15px var(--blue); margin-bottom: 30px;">NEON GHOST</h1>
        <button class="btn" style="background:white; color:#222;" onclick="handleLogin()">
            <img src="https://www.google.com/favicon.ico" width="20"> CONTINUE WITH GOOGLE
        </button>
        <p style="font-size: 12px; margin-top: 20px; opacity: 0.6;">Secure login via Supabase Auth</p>
    </div>

    <div id="lobbySection" class="panel hidden">
        <h2 id="displayName" style="margin-top: 0;">Welcome, Hero</h2>
        <div class="xp-tag"><span id="displayXP">0</span> XP</div>
        <p style="font-size: 14px; opacity: 0.8;">Enter a room code to battle</p>
        
        <input type="text" id="roomInput" placeholder="ROOM CODE (e.g. 123)">
        <button class="btn" style="background:var(--blue); color: #000;" onclick="joinMatch()">ENTER ARENA</button>
        
        <button class="btn" style="background:transparent; color: #ff4444; font-size: 12px; border: 1px solid #ff444433;" onclick="handleLogout()">Logout</button>
    </div>

    <script>
        // 1. CONFIGURATION - Use your actual keys from Supabase
        const SUPABASE_URL = 'https://pcvszmvpazwkfufiaowm.supabase.co'; //
        const SUPABASE_KEY = 'YOUR_ANON_KEY'; // Replace with your 'anon' key
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const socket = io();
        let currentUser = null;

        // 2. AUTHENTICATION LOGIC
        async function handleLogin() {
            const { error } = await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { 
                    // This uses your live Render URL automatically
                    redirectTo: window.location.origin 
                }
            });
            if (error) alert("Login Error: " + error.message);
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.reload();
        }

        // 3. THE "SYNC" - This runs automatically when the page loads or you return from Google
        _supabase.auth.onAuthStateChange(async (event, session) => {
            if (session) {
                currentUser = session.user;
                
                // Show the Lobby UI and hide Login
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('lobbySection').classList.remove('hidden');
                document.getElementById('displayName').innerText = "Hero: " + currentUser.user_metadata.full_name;

                // Tell your Render server that a Google user has arrived
                try {
                    const response = await fetch('/auth/google-sync', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: currentUser.email,
                            name: currentUser.user_metadata.full_name
                        })
                    });
                    const data = await response.json();
                    document.getElementById('displayXP').innerText = data.points || 0;
                } catch (err) {
                    console.error("Server sync failed:", err);
                }
            }
        });

        // 4. GAME LOGIC
        function joinMatch() {
            const code = document.getElementById('roomInput').value;
            if (!code) return alert("Please enter a room code!");
            
            socket.emit('joinRoom', { 
                roomID: code, 
                email: currentUser.email,
                username: currentUser.user_metadata.full_name 
            });
            
            alert("Joining Room: " + code + ". Wait for opponent!");
            // Add your logic here to switch to the game board <div>
        }
    </script>
</body>
</html>
