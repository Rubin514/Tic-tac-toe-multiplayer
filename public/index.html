<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Online Tic Tac Toe</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #0f172a; color: white; min-height: 100vh; margin: 0; padding: 20px; }
        .container { max-width: 400px; width: 100%; text-align: center; }
        .lobby { background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 20px; }
        input { padding: 10px; border-radius: 6px; border: none; width: 70%; margin-bottom: 10px; }
        .board { display: none; grid-template-columns: repeat(3, 100px); grid-gap: 8px; justify-content: center; margin: 20px 0; }
        .cell { width: 100px; height: 100px; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .cell:hover { background: #475569; }
        .status { margin: 15px; font-weight: bold; color: #38bdf8; min-height: 24px; }
        #chat-box { display: none; background: #1e293b; border-radius: 12px; padding: 15px; margin-top: 20px; }
        #messages { height: 100px; overflow-y: auto; text-align: left; font-size: 0.9rem; border-bottom: 1px solid #334155; margin-bottom: 10px; padding: 5px; }
        button { padding: 10px 20px; cursor: pointer; background: #38bdf8; border: none; border-radius: 6px; font-weight: bold; color: #0f172a; }
        button:disabled { background: #64748b; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tic Tac Toe</h1>

        <div class="lobby" id="lobby">
            <input type="text" id="roomInput" placeholder="Enter Room Code...">
            <button onclick="joinRoom()">Join Game</button>
        </div>

        <div class="status" id="status">Join a room to play!</div>
        
        <div class="board" id="board">
            <div class="cell" onclick="handleCellClick(0)"></div>
            <div class="cell" onclick="handleCellClick(1)"></div>
            <div class="cell" onclick="handleCellClick(2)"></div>
            <div class="cell" onclick="handleCellClick(3)"></div>
            <div class="cell" onclick="handleCellClick(4)"></div>
            <div class="cell" onclick="handleCellClick(5)"></div>
            <div class="cell" onclick="handleCellClick(6)"></div>
            <div class="cell" onclick="handleCellClick(7)"></div>
            <div class="cell" onclick="handleCellClick(8)"></div>
        </div>

        <button id="restartBtn" style="display:none;" onclick="requestRestart()">Restart</button>

        <div id="chat-box">
            <div id="messages"></div>
            <input type="text" id="chatInput" placeholder="Say hello..." style="width:65%;">
            <button onclick="sendMessage()" style="padding: 8px;">Send</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myTurn = false;
        let mySymbol = "";
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');

        function joinRoom() {
            const room = document.getElementById('roomInput').value;
            if (room) socket.emit('joinRoom', room);
        }

        socket.on('joined', (room) => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('board').style.display = 'grid';
            document.getElementById('chat-box').style.display = 'block';
            document.getElementById('restartBtn').style.display = 'inline-block';
            mySymbol = "X"; // Defaulting first joiner to X
            myTurn = true;
            statusText.innerText = "Your turn (X)!";
        });

        function handleCellClick(index) {
            if (cells[index].innerText === "" && myTurn) {
                cells[index].innerText = mySymbol;
                cells[index].style.color = "#38bdf8";
                socket.emit('move', { index, symbol: mySymbol });
                myTurn = false;
                statusText.innerText = "Opponent's turn...";
                checkWinner();
            }
        }

        socket.on('move', (data) => {
            cells[data.index].innerText = data.symbol;
            cells[data.index].style.color = "#fb7185";
            myTurn = true;
            statusText.innerText = "Your turn!";
            checkWinner();
        });

        function checkWinner() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let combo of wins) {
                const [a, b, c] = combo;
                if (cells[a].innerText && cells[a].innerText === cells[b].innerText && cells[a].innerText === cells[c].innerText) {
                    statusText.innerText = `Player ${cells[a].innerText} Wins!`;
                    myTurn = false;
                    return;
                }
            }
        }

        // Chat Logic
        function sendMessage() {
            const input = document.getElementById('chatInput');
            if (input.value) {
                socket.emit('chatMessage', input.value);
                addMessage(`You: ${input.value}`);
                input.value = '';
            }
        }

        socket.on('chatMessage', (msg) => addMessage(`Friend: ${msg}`));

        function addMessage(text) {
            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML += `<div>${text}</div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }

        function requestRestart() {
            cells.forEach(c => c.innerText = "");
            myTurn = true;
            statusText.innerText = "Game Restarted!";
            socket.emit('restart');
        }

        socket.on('restart', () => {
            cells.forEach(c => c.innerText = "");
            myTurn = false;
            statusText.innerText = "Opponent restarted. Their turn.";
        });
    </script>
</body>
</html>
